name: Morning Brief

on:
  schedule:
    # Five off-peak attempts spread across the morning. GitHub silently drops
    # scheduled ticks on free-tier public repos during peak traffic windows
    # (both prior 6:10 + 6:40 ticks were dropped 2026-06-03). The brief is
    # idempotent (clears + regenerates Todoist), so multiple successful
    # attempts just rewrite the same content — adding redundancy is free.
    # All minutes off the :00 slot, which is GitHub's most-delayed.
    - cron: '7 13 * * *'   # ~6:07 AM Arizona — primary
    - cron: '23 13 * * *'  # ~6:23 AM Arizona — backup 1
    - cron: '47 13 * * *'  # ~6:47 AM Arizona — backup 2
    - cron: '13 14 * * *'  # ~7:13 AM Arizona — backup 3
    - cron: '37 14 * * *'  # ~7:37 AM Arizona — backup 4 (last attempt before manual)
  workflow_dispatch:        # manual trigger from GitHub Actions UI

jobs:
  brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # archiver writes back to daily-log.md

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r cloud/morning-brief/requirements.txt

      - name: Run morning brief
        working-directory: cloud/morning-brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TODOIST_API_KEY: ${{ secrets.TODOIST_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AIOS_BRANCH: master
          AIOS_LOCAL_PATH: ${{ github.workspace }}
        run: python main.py morning
