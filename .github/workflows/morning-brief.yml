name: Morning Brief

on:
  schedule:
    - cron: '10 13 * * *'  # ~6:10 AM Arizona (UTC-7) — earlier buffer before 7am; off the :00 slot (GitHub's most-delayed)
    - cron: '40 13 * * *'  # ~6:40 AM Arizona backup — fires if GitHub drops the 6:10 tick (morning_brief clears + regenerates, so a second run is idempotent at this hour)
  workflow_dispatch:        # manual trigger from GitHub Actions UI

jobs:
  brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # archiver writes back to daily-log.md

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r cloud/morning-brief/requirements.txt

      - name: Run morning brief
        working-directory: cloud/morning-brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TODOIST_API_KEY: ${{ secrets.TODOIST_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AIOS_BRANCH: master
          AIOS_LOCAL_PATH: ${{ github.workspace }}
        run: python main.py morning
