name: Morning Brief

on:
  schedule:
    # SINGLE cron — primary 4:07am AZ (11:07 UTC). Reduced from 5 crons
    # 2026-06-22 after audit found ~5 successful runs/day at ~$0.07/call =
    # ~$10/month duplicate Anthropic API spend. Original comment ("idempotent
    # rewrite is free") was true for Todoist but ignored API billing.
    # GitHub's 2-3 hr cron delays mean brief still lands by ~7am AZ on
    # most days. If a day misses entirely (rare), trigger manually via
    # workflow_dispatch in the GitHub Actions UI.
    - cron: '7 11 * * *'   # ~4:07 AM Arizona — primary
  workflow_dispatch:        # manual trigger from GitHub Actions UI

jobs:
  brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # archiver writes back to daily-log.md

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r cloud/morning-brief/requirements.txt

      - name: Run morning brief
        working-directory: cloud/morning-brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TODOIST_API_KEY: ${{ secrets.TODOIST_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AIOS_BRANCH: master
          AIOS_LOCAL_PATH: ${{ github.workspace }}
        run: python main.py morning
