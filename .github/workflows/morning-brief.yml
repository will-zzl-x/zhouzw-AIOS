name: Morning Brief

on:
  schedule:
    - cron: '0 14 * * *'   # 7:00 AM Arizona (UTC-7, no DST)
  workflow_dispatch:        # manual trigger from GitHub Actions UI

jobs:
  brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # archiver writes back to daily-log.md

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/build-coding-skills-K5mpd

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r cloud/morning-brief/requirements.txt

      - name: Run morning brief
        working-directory: cloud/morning-brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TODOIST_API_KEY: ${{ secrets.TODOIST_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AIOS_BRANCH: claude/build-coding-skills-K5mpd
          AIOS_LOCAL_PATH: ${{ github.workspace }}
        run: python main.py morning
