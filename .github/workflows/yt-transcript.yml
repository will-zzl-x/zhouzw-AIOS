# TEMPORARY — one-shot transcript fetch, attempt 3 (fixed camelCase key bug:
# Invidious returns languageCode, not language_code — nadeko responded fine
# on attempt 2 and was wrongly skipped). Will be deleted after retrieval.
name: yt-transcript
on:
  push:
    branches: ["claude/weekly-reflection-lifting-data-Gsh0P"]
    paths: [".github/workflows/yt-transcript.yml"]
permissions:
  contents: read
jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      VID: "-SUuWecskr0"
    steps:
      - name: Fetch transcript from Invidious
        shell: bash
        run: |
          set +e
          for inst in inv.nadeko.net invidious.nerdvpn.de; do
            echo "--- $inst ---"
            capurl=$(curl -sS --max-time 20 "https://$inst/api/v1/captions/$VID" | python3 -c "
          import json,sys
          try:
              d=json.load(sys.stdin)
              c=d.get('captions',[])
              en=[x for x in c if x.get('languageCode', x.get('language_code','')).startswith('en')] or c
              print(en[0]['url'] if en else '')
          except Exception: print('')")
            echo "capurl: $capurl"
            if [ -n "$capurl" ]; then
              rm -f sub.vtt
              curl -sS --max-time 30 "https://$inst$capurl" -o sub.vtt
              if [ -s sub.vtt ]; then
                echo "=== TRANSCRIPT START ==="
                grep -v -E '^(WEBVTT|Kind:|Language:|NOTE|[0-9:.]+ -->|$)' sub.vtt | awk '!seen[$0]++'
                echo "=== TRANSCRIPT END ==="
                exit 0
              fi
            fi
          done
          echo "FAILED"
          exit 1
