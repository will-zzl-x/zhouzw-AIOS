# Selected recipes for the week.
selections:
  # #34 MODIFIED — Slow Cooker Pulled Pork (replaces dry-roast method for moisture)
  # Cook Mon morning post-5am lift; LOW 6-8 hrs; shred Mon evening with juices.
  - recipe_id: "34"
    planned_servings: 6
    notes: |
      MODIFIED FROM ORIGINAL RECIPE — slow cooker pulled pork (not sheet-pan roast) for moisture.
      Method: 1.75 lb pork loin whole + 1 cup chicken broth + 1 Tbsp ACV + 2 Tbsp BBQ or pickle juice
      + 1 sliced onion + salt/garlic powder/pepper/paprika rub. Slow cooker LOW 6-8 hrs.
      Shred with two forks. Keep with juices. Portion into 6 containers (Mon-Sat M1).
      Reheat: 45-60 sec microwave covered with juices for moisture.
      Cook Mon morning post-lift; shred Mon evening alongside dinner prep.
    slot_assignments:
      - { member: Will, slot: M1, servings: 6 }   # Mon-Sat home mornings

  # #5 Crispy Chicken Sandwiches + FROZEN onion rings — M4 ONLY (does not microwave-reheat)
  - recipe_id: "5"
    planned_servings: 8
    notes: |
      6 brioche buns (Elena) + 2 servings on low-cal sandwich bread (Will) = 8 sandwiches.
      Sub HOMEMADE onion rings → FROZEN onion rings (Walmart, air-fry per package).
      Assemble fresh each night; parcook chicken Mon for the week.
    slot_assignments:
      - { member: Both, slot: M4, servings: 8 }   # 4 shared dinner nights

  # #23 Walmart Beef Burgers + fries — M4 only, uses 1.5 lb of 8.75 lb ground beef stash
  - recipe_id: "23"
    planned_servings: 4
    notes: |
      Uses ~1.5 lb of inventory ground beef (8.75 lb total in freezer — 7 × 20oz Costco bags).
      Buns: Elena uses brioche if any of the 6 remain after #5; Will uses low-cal bread.
      Recipe says "Walmart Beef Burgers" but use the Costco ground beef stash instead.
    slot_assignments:
      - { member: Both, slot: M4, servings: 4 }   # 2 shared dinner nights

  # #35 Chinese Poached Chicken — reheatable M2 work lunch
  - recipe_id: "35"
    planned_servings: 4
    notes: |
      Repeat from last cycle (enjoyed it). 4 servings = 2 days × 2 (Will + Elena M2).
    slot_assignments:
      - { member: Will, slot: M2, servings: 2 }
      - { member: Elena, slot: M2, servings: 2 }

  # #20 Slow Cooker Shredded Chicken + frozen Costco stir-fry veg — fills the remaining work-meal gap
  # Cook Mon morning in 2nd slow cooker (Instant Pot in slow-cook mode); LOW 4 hrs + auto-warm hold until evening shred.
  - recipe_id: "20"
    planned_servings: 11
    notes: |
      Scale up chicken breasts to ~3.5 lb for 11 servings.
      Cook Mon morning in 2nd slow cooker (Instant Pot slow-cook LOW 4 hrs, then auto-warm until 5pm).
      Shred Mon evening alongside pulled pork. Portion with juices.
      USE COSTCO FROZEN STIR-FRY VEG: sauté 1 bag (3-4 srv) as the veg side for these bowls.
      Pair with rice (already in pantry).
    slot_assignments:
      - { member: Will, slot: M2, servings: 3 }
      - { member: Will, slot: M3, servings: 5 }
      - { member: Elena, slot: M2, servings: 3 }

