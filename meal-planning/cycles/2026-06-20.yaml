# Selected recipes for the week.
selections:
  # #34 MODIFIED — Slow Cooker CARNITAS-style Pulled Pork (Mexican)
  # Cook Mon morning before work; LOW 6-8 hrs auto-warm; shred Mon evening post-lift.
  - recipe_id: "34"
    planned_servings: 6
    notes: |
      MODIFIED — Slow cooker CARNITAS-style pulled pork (Mexican flavor profile for M1
      breakfast bowls with eggs).

      Method (1.75 lb pork loin whole):
      Cooking liquid: 1 cup chicken broth + juice of 1 orange + juice of 1 lime (use ~1/2 of
      each, save other halves for sauce later)
      Rub: 2 tsp cumin + 2 tsp dried oregano + 1 tsp garlic powder + 1 tsp salt + 1/2 tsp
      black pepper + 2 bay leaves (whole, fish out before shredding)

      Slow cooker LOW 6-8 hrs. Shred with two forks. Reduce liquid slightly (5 min on HIGH
      uncovered) for more flavor concentration. Portion with juices into 6 containers.
      Reheat: 45-60 sec microwave covered with juices.

      M1 pairing: scrambled eggs + warm pulled pork + dash of leftover Costco salsa (you
      have ~half container in inventory).

      VEG SIDE FOR M1: sauté 1 bag of Costco frozen stir-fry veg (no bell peppers per Will's
      preference) Monday alongside the pork shred. Portion ~3/4 cup of veg into each of
      6 M1 containers. Microwave with pork in the morning (45-60 sec).

      Cook Mon morning (start before work post-evening-lift schedule);
      shred Mon evening when home.
    slot_assignments:
      - { member: Will, slot: M1, servings: 6 }   # Mon-Sat home mornings

  # #5 Crispy Chicken Sandwiches + FROZEN onion rings — M4 ONLY (does not microwave-reheat)
  - recipe_id: "5"
    planned_servings: 8
    notes: |
      6 brioche buns (Elena) + 2 servings on low-cal sandwich bread (Will) = 8 sandwiches.
      Sub HOMEMADE onion rings → FROZEN onion rings (Walmart, air-fry per package).
      Assemble fresh each night; parcook chicken Mon for the week.
      M4 SIDE VEG: air-fry frozen stir-fry veg alongside the onion rings + fries (same air
      fryer, lower temp/time per package). ~3/4 cup per person.
    slot_assignments:
      - { member: Both, slot: M4, servings: 8 }   # 4 shared dinner nights

  # #23 Walmart Beef Burgers + fries — M4 only, uses 1.5 lb of 8.75 lb ground beef stash
  - recipe_id: "23"
    planned_servings: 4
    notes: |
      Uses ~1.5 lb of inventory ground beef (8.75 lb total in freezer — 7 × 20oz Costco bags).
      Buns: Elena uses brioche if any of the 6 remain after #5; Will uses low-cal bread.
      Recipe says "Walmart Beef Burgers" but use the Costco ground beef stash instead.
      M4 SIDE VEG: air-fry frozen stir-fry veg alongside the fries (same air fryer, lower
      temp/time per package). ~3/4 cup per person.
    slot_assignments:
      - { member: Both, slot: M4, servings: 4 }   # 2 shared dinner nights

  # #35 Chinese Poached Chicken — reheatable M2 work lunch
  - recipe_id: "35"
    planned_servings: 4
    notes: |
      Repeat from last cycle (enjoyed it). 4 servings = 2 days × 2 (Will + Elena M2).
    slot_assignments:
      - { member: Will, slot: M2, servings: 2 }
      - { member: Elena, slot: M2, servings: 2 }

  # #20 Slow Cooker Shredded Chicken + frozen Costco stir-fry veg — fills the remaining work-meal gap
  # TIMING UPDATED: Will lifts after work now, so cooking via Instant Pot PRESSURE COOK Mon evening
  # is cleaner than all-day slow-cook (avoids 9+ hrs on auto-warm getting dry).
  - recipe_id: "20"
    planned_servings: 11
    notes: |
      Scale up chicken breasts to ~3.5 lb for 11 servings.
      TIMING UPDATE: Will lifts after work — Mon morning slow-cook all-day would leave chicken
      9+ hrs on auto-warm (dryness risk). Better: use Instant Pot PRESSURE COOK Mon evening.

      Method (Instant Pot pressure cook CHIPOTLE-LIME Mexican shredded, ~30 min total):
      - ~3.5 lb chicken breasts
      - Cooking liquid: 1 cup chicken broth + juice of 1 lime + 2 Tbsp Costco salsa
        (use from inventory — half container on hand)
      - Spice mix: 1 Tbsp cumin + 1 Tbsp chili powder + 1 tsp garlic powder + 1 tsp salt
        + 1 tsp paprika + 1/2 tsp chipotle powder
      - HIGH PRESSURE 15 min + natural release 10 min
      - Shred with two forks. Keep with juices. Portion with rice + frozen stir-fry veg side.

      USE COSTCO FROZEN STIR-FRY VEG: sauté 1 bag (3-4 srv) as the veg side for these bowls.
      Top each bowl with extra Costco salsa from inventory + lime wedge.
      Pair with rice (already in pantry).

      Cook Tuesday evening — pulled pork shred takes Monday evening, this stays clean.
    slot_assignments:
      - { member: Will, slot: M2, servings: 3 }
      - { member: Will, slot: M3, servings: 5 }
      - { member: Elena, slot: M2, servings: 3 }

