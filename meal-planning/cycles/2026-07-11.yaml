#     cycle window. #9 Bibimbap uses ~1.3 lb; the rest still needs a use next cycle
#     or should be frozen to extend it past 7/15.
#   - Canned wild salmon, 3 cans on hand, no freshness_date (shelf-stable) — #26
#     uses all 3, fully depleted this cycle.
#   - Eggs, 18 on hand, but logged freshness_date is 2026-06-25 — ALREADY PAST as
#     of this cycle's start (7/11). Either the inventory record is stale (needs a
#     fresh count) or the eggs themselves need checking before use in #9 (needs 6).
inventory_snapshot:
  - { name: "Protein bars (Elena M1)", amount: "0", unit: "bars", note: "buy ~10 — not tracked by coverage.py, note only" }

