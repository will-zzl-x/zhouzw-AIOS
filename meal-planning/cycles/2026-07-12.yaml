# Cycle Sun 2026-07-12 -> Sat 2026-07-18 — Reverse Diet Step 1 (Will) + Gaintain (Elena)
# Built with Claude 2026-07-10, ahead of the cycle start (cut ends Sat 7/11).
# Will: 2,000 cal / 150g protein / 50g fat / 238g carbs/day (goals/nyc-cut.md Step 1).
# Elena: ~1,500 cal / 90g protein / 50g fat / 173g carbs/day, gaintain, mid-luteal, low appetite (config.yaml).
# Backbone: the 3 modular fork recipes (#28, #31, #32) cover most of the week — cook once,
# fork Will (high-volume) vs Elena (calorie-dense) at the plate. See config.yaml modular_assembly.
date: "2026-07-12"
grocery_day: "2026-07-11"   # Saturday — Walmart + Costco (last day of the cut)

exceptions: []
carryover: []

selections:
  # #34 Will M1 — starch-free breakfast, 7 mornings.
  - recipe_id: "34"
    planned_servings: 7
    notes: |
      Unchanged from the cut — Will's M1 stays starch-free per config.yaml regardless
      of reverse-diet phase (M1/M2 starch-free rule is a slot rule, not a cut rule).
      ~250 cal / 30g protein / 10g fat / 6g carbs per serving (est., matches prior cycles).
    slot_assignments:
      - { member: Will, slot: M1, servings: 7 }

  # #31 Modular Slow-Cooker Chicken + Sheet-Pan Veg + Rice — M2 backbone, 5 days each.
  - recipe_id: "31"
    planned_servings: 10
    notes: |
      Rice portions already updated in recipes.json 2026-07-10 for the reverse diet
      (Will 0.3->0.75 cup, matching Elena). WILL ASSEMBLY: ~530 cal / 50g protein /
      5g fat / 63g carbs. ELENA ASSEMBLY (unchanged): ~530 cal / 45g protein / 18g fat
      / 45g carbs. If Elena is short of target, add density (extra cheese/avocado),
      not volume — per config.yaml elena_low_appetite_protocol.
    slot_assignments:
      - { member: Will, slot: M2, servings: 5 }
      - { member: Elena, slot: M2, servings: 5 }

  # #32 Modular Mediterranean Lemon Chicken — fills remaining M2 + 3 shared M4 nights.
  - recipe_id: "32"
    planned_servings: 10
    notes: |
      Farro added to Will's fork in recipes.json 2026-07-10 (was none, on the cut).
      WILL ASSEMBLY: ~480 cal / 50g protein / 5g fat / 42g carbs. ELENA ASSEMBLY
      (unchanged): ~580 cal / 45g protein / 22g fat / 45g carbs.
    slot_assignments:
      - { member: Will, slot: M2, servings: 2 }
      - { member: Elena, slot: M2, servings: 2 }
      - { member: Will, slot: M4, servings: 3 }
      - { member: Elena, slot: M4, servings: 3 }

  # #28 Modular Bittman Chinese Steamed Chicken Bowl — Will's M3 backbone + Elena M4 fill-in.
  - recipe_id: "28"
    planned_servings: 10
    notes: |
      Will fork used at M3 (solo work-meal slot, reheatable). Elena fork used at M4
      (4 of her 5 portions — 1 spare as a second-helping/leftover buffer, not slot-
      assigned, eaten opportunistically whichever night appetite allows more).
      Rice already updated in recipes.json 2026-07-10 (Will 0.3->0.75 cup).
      WILL ASSEMBLY: ~510 cal / 50g protein / 7g fat / 50g carbs. ELENA ASSEMBLY
      (unchanged): ~530 cal / 50g protein / 17g fat / 50g carbs.
    slot_assignments:
      - { member: Will, slot: M3, servings: 5 }
      - { member: Elena, slot: M4, servings: 4 }

  # #20 Slow Cooker Shredded Chicken — fills remaining Will M3 (2 needed + 1 buffer).
  - recipe_id: "20"
    planned_servings: 3
    notes: |
      M3 version (not starch-free — M3 allows carbs): chicken + ~0.75 cup rice or 1
      small potato + frozen veg + G Hughes BBQ or salsa. ~380 cal / 40g protein / 6g
      fat / 40g carbs per serving (est.) — sized to close the reverse-diet carb gap,
      same logic as the modular-recipe rice bumps above.
    slot_assignments:
      - { member: Will, slot: M3, servings: 3 }

  # #9 Bibimbap — Will-only dinner nights to close remaining M4 need (no Elena share;
  # she's already fully covered via #32 + #28, and force-adding volume here would
  # work against the low-appetite protocol).
  - recipe_id: "9"
    planned_servings: 4
    notes: |
      Will-only this cycle. ~480 cal / 35g protein / 22g fat / 35g carbs per serving
      (est. — 90/10 ground beef + fried egg + 0.25 cup dry rice-equivalent + veg).
      Runs a bit higher-fat than the modular recipes; fine as one of several meals
      against the 50g/day fat budget, not the whole day's fat allowance.
    slot_assignments:
      - { member: Will, slot: M4, servings: 4 }

# Elena M1 (protein bar) is grab-and-go, not coverage-tracked (coverage.py skips
# any M1 slot containing "bar"/"shake"). Stock 7-10 bars for the week.
# ~190 cal / 20g protein / 6g fat / 20g carbs per bar (est., standard protein bar).
inventory_snapshot:
  - { name: "Protein bars (Elena M1)", amount: "0", unit: "bars", note: "buy 10 — not tracked by coverage.py, note only" }

