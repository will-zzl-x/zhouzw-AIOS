#   vs target 2,000 / 150 / 50 / 238 -> ~230 cal / ~85g carbs short. Protein/fat
#   already over target (fine). Close the gap with a carb-forward snack (fruit,
#   extra rice, a slice of bread) at M3 or M4 — don't cut protein/fat to compensate.
# WILL, M2-#32/M3-#20/M4-#32 variant day:
