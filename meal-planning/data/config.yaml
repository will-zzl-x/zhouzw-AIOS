# Meal-planning system config — household, members, slots, stores, equipment, rules.
# DETERMINISTIC scripts read this; no AI. Edit freely as the system evolves.

household:
  location: Chandler, AZ
  cycle: Sat-to-Sat
  grocery:
    walmart_order: Friday night   # online order
    costco_run: Saturday morning

members:
  - id: Will
    on_cut: false          # cut ended Jul 11 2026 — now in reverse diet (see goals/nyc-cut.md)
    phase: reverse_diet_step1   # Jul 12-18: step 1 of 3. Step 2 (~Jul 19-25) and Step 3 (~Jul 26-29) bump these numbers — update here when the phase rolls.
    macro_targets:
      calories: 2000
      protein_g: 150
      fat_g: 50
      carbs_g: 238
      note: >
        Derived from empirical TDEE (~2,150-2,250 at ~180lb, see state.md), not a
        textbook formula. Protein/fat held flat across all 3 reverse-diet steps;
        carbs are the flex lever. Modular-recipe Will-fork portions (rice/starch)
        need to scale UP from their cut-era defaults to hit this — see
        modular_assembly below.
    slots:
      M1: protein shake          # UPDATED 2026-07-10 — was "lean protein + veg, NO shakes for M1"; Will changed this directly. Grab-and-go, excluded from coverage.py tracking (M1 slots containing "bar"/"shake" are skipped in build_need).
      M2: microwave lunch        # reheatable only
      M3: microwave solo work meal  # reheatable only, Will-only convenience stack. Shakes OK here.
      M4: dinner                 # home-cooked, shared with Elena
  - id: Elena
    on_cut: false
    phase: gaintain        # recomp-leaning maintenance+ — light controlled surplus, not a cut or a bulk
    cycle_phase: mid_luteal # UPDATE each cycle as her cycle progresses — affects appetite/BMR, see macro note
    appetite: low           # drives modular-fork sizing — see modular_assembly below
    macro_targets:
      calories: 1500
      protein_g: 90
      fat_g: 50
      carbs_g: 173
      note: >
        ESTIMATE ONLY (~14 cal/lb at 102 lb + small gaintain surplus) — unlike
        Will's TDEE this is not yet calibrated against a real logged weight trend.
        Recalibrate against her actual weekly weight trend once a few weeks of
        data exist, same 3,500-kcal/lb methodology used for Will (see state.md).
        Mid-luteal phase: BMR runs ~100-300 cal higher than follicular-phase
        baseline and appetite/cravings often shift toward carbs/comfort food —
        don't fight a slightly higher intake this week, and don't over-interpret
        a mid-luteal weight bump as fat gain (water retention is the more likely
        cause). Protein floor (90g) is the non-negotiable; calories are a
        flexible target given the appetite constraint below.
    slots:
      M1: vanilla protein shake  # UPDATED 2026-07-10 — was "protein bar". Grab-and-go, excluded from coverage.py tracking.
      M2: microwave lunch        # shared/A-tier vetted recipes
      M4: dinner shared          # shared with Will

# UPDATED 2026-07-10: #28/#31/#32 (the original "modular fork" recipes this
# section was written around) were all deleted — confirmed fabricated, not
# real dishes either Will or Elena cook (see git history / cycles/2026-07-11.yaml
# header for the full story). The shared-meal pattern going forward is simpler:
# a handful of dishes (currently #35 Chinese chicken, #39 Korean chicken, #10
# Spaghetti) are cooked once and split evenly between Will and Elena at the
# table — same portion for both, no per-person fork/assembly customization.
# Elena's individual meals (M2) use separate, Elena-specific recipes instead
# (currently #40, #41) rather than a fork of a shared Will-oriented recipe.
modular_assembly:
  pattern: >
    Shared M4 dishes (#35, #39, #10) are split evenly between Will and Elena
    when eaten together — same recipe, same portion, no fork. This replaced
    the earlier "cook once, fork differently per person" convention after
    that turned out to be based on fabricated recipe data.
  elena_low_appetite_protocol: >
    If a planned portion goes unfinished, protein is the priority — eat the
    protein + topping first, leave rice/veg bulk for later or skip it. Keep a
    liquid-calorie backup on hand (Elena's vanilla protein shake, recipe #38)
    for days appetite is especially low, so the protein floor still gets hit
    even if solid food intake falls short of the full plate.

# Slot rules — drive coverage + cook_schedule + reheatability checks.
slots:
  M2: { reheat: microwave, overflow_to: [M3, M4] }
  M3: { reheat: microwave, overflow_to: [M4] }
  M4: { reheat: home-cooked, overflow_to: [] }   # salmon: oven/air-fryer 325F, NEVER microwave
reheat_rules:
  salmon: "325F oven or air fryer — NEVER microwave"
  dining_out: "flexible; assign to slot with greatest deficit"

# Cut constraints (Will) — used by suggest_recipes AI template + coverage notes.
cut:
  protein_per_day_g: 150
  protein_per_feeding_g: 45
  m1_m2: starch-free / low-carb     # save calories for fruit at M3
  low_cal_sauces:
    - G Hughes BBQ
    - low-cal ketchup
    - sriracha
    - hot sauce
    - salsa
    - mustard
    - Greek-yogurt blends
  dining_out: >
    carb-forward low-fat refeed. Japanese / Vietnamese / Korean best.
    Mediterranean OK if lean-ordered (grilled protein + rice/pita; go easy on
    hummus/falafel/gyro/oil).

# Meal-type split — which recipe pool feeds which meals.
meal_type_split:
  shared:        # M4 + Elena M2
    slots: [M4]
    pool: A/S-tier vetted recipes
  solo_convenience:  # Will M3 + Will M2
    slots: [M3]
    pool:
      - rotisserie
      - slow-cooker shredded chicken
      - canned salmon + Greek yogurt bowls
      - air-fryer chicken+veg bakes
      - low-cal sauces

stores: [Costco, Walmart, Asian Mart]

equipment:
  - air fryer
  - rice cooker
  - 6qt enameled Dutch oven
  - wok
  - instant pot
  - slow cooker
  - Ninja Creami Deluxe
  - cast iron
stove: electric (burner max 9)

# Defrost lead times (hours) by protein — defrost.py reads these.
defrost_lead_hours:
  beef: [12, 18]
  thighs: [12, 18]
  chicken thigh: [12, 18]
  breast: [18, 24]
  chicken breast: [18, 24]
  steak: [12, 18]
  ground beef: [12, 18]
move_lead_nights: 2   # move from freezer 2 nights before first cook

# Cooking rules — surfaced as notes by cook_schedule.py; not enforced logic.
cooking_rules:
  - avocado oil for high-heat; olive oil low-heat or air-fryer
  - dry-brine steaks overnight uncovered on a rack
  - dissolve bouillon in warm water first
  - electric-stove Dutch oven preheat 60-90s max, water-drop test (burn risk)
  - always break down rotisserie Saturday
  - day-old chilled rice for fried rice
  - air-fried kale goes limp in storage; sauté for batch containers, air-fry only fresh-day

# Cook-ordering weights for cook_schedule.py (lower = cook earlier).
cook_priority:
  freshness_urgency: 0    # most-perishable first
  marinade_lead: 1        # needs overnight marinade
  slow_or_long_simmer: 2  # slow-cooker / long braise started early
  rotisserie_saturday: 3  # rotisserie breakdown is a Saturday anchor
  standard: 4
